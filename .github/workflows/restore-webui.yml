name: Restore webui.py

on:
  workflow_dispatch:
    inputs:
      base_commit:
        description: 'Base commit SHA with correct pre-patch webui.py'
        required: false
        default: '42ce002'

jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/host-network-default
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download pre-patch webui.py and apply fixes
        run: |
          set -e
          BASE="${{ github.event.inputs.base_commit || '42ce002' }}"
          curl -sf "https://raw.githubusercontent.com/jdibby/traffgen/${BASE}/webui.py" -o /tmp/webui_base.py
          echo "Base size: $(wc -c < /tmp/webui_base.py) bytes"
          python3 - <<'PYEOF'
          with open('/tmp/webui_base.py', 'r', encoding='utf-8') as f:
              c = f.read()
          changes = [
              ("const H=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');",
               "const H=s=>String(s).replace(/&/g,'&amp;').replace(/\\x3c/g,'&lt;').replace(/\\x3e/g,'&gt;');"),
              ("// ── Column sort ──────────────────────────────────────────────",
               "// -- Column sort --------------------------------------------------------------"),
              ("  const s=(txt||'').trim().split('\\n')[0].trim();",
               "  const s=(txt||'').trim().split(/\\n/)[0].trim();"),
              ("  if(s==='—'||s==='')return Infinity;",
               "  if(s==='\\u2014'||s==='')return Infinity;"),
              ("// ── Draggable overview widgets ───────────────────────────────────────────",
               "// -- Draggable overview widgets -------------------------------------------------"),
              ("// ── Health / perf functions ────────────────────────────────────────────",
               "// -- Health / perf functions ----------------------------------------------------"),
              ("// ── Network info widget ───────────────────────────────────────────────",
               "// -- Network info widget -------------------------------------------------------"),
              ("// ── Security Summary ──────────────────────────────────────────────────",
               "// -- Security Summary ----------------------------------------------------------"),
              ("// ── Traceroute visualizer ──────────────────────────────────────────────",
               "// -- Traceroute visualizer --------------------------------------------------"),
              ("// ── TLS Inspector ─────────────────────────────────────────────────────",
               "// -- TLS Inspector ---------------------------------------------------------"),
              ("// ── DNS Lookup ────────────────────────────────────────────────────────",
               "// -- DNS Lookup ------------------------------------------------------------"),
              ("// ── On-demand runner (#216) ───────────────────────────────────────────────",
               "// -- On-demand runner (#216) -----------------------------------------------"),
              ("// ── Run history ──────────────────────────────────────────────────────────",
               "// -- Run history ----------------------------------------------------------"),
              ("// ── Keyboard shortcuts ───────────────────────────────────────────────────",
               "// -- Keyboard shortcuts ---------------------------------------------------"),
              ("// ── Latency tracking (#213 / #214) ────────────────────────────────────────────",
               "// -- Latency tracking (#213 / #214) ----------------------------------------"),
              ("// ── Canvas hover tooltips ──────────────────────────────────────────────────",
               "// -- Canvas hover tooltips --------------------------------------------------"),
              ("// ── Disclaimer modal (shown once per browser session) ─────────────────────",
               "// -- Disclaimer modal (shown once per browser session) ---------------------"),
          ]
          applied = 0
          for old, new in changes:
              if old in c:
                  c = c.replace(old, new, 1)
                  applied += 1
              else:
                  print(f'WARNING: could not find: {old[:60]!r}')
          print(f'Applied {applied}/{len(changes)} changes')
          with open('webui.py', 'w', encoding='utf-8') as f:
              f.write(c)
          import hashlib
          digest = hashlib.md5(c.encode()).hexdigest()
          print(f'Result: {len(c)} chars, MD5={digest}')
          PYEOF

      - name: Verify and commit
        run: |
          EXPECTED_MD5="86af6ff8ce4bf3ac8624899ff9574741"
          ACTUAL_MD5=$(python3 -c "import hashlib; print(hashlib.md5(open('webui.py','rb').read()).hexdigest())")
          echo "Expected MD5: $EXPECTED_MD5"
          echo "Actual MD5:   $ACTUAL_MD5"
          if [ "$ACTUAL_MD5" != "$EXPECTED_MD5" ]; then
            echo "ERROR: MD5 mismatch - patch did not apply correctly"
            exit 1
          fi
          git config user.name "jdibby"
          git config user.email "48450541+jdibby@users.noreply.github.com"
          git add webui.py
          git diff --cached --stat
          git commit -m "fix: eliminate browser JS parse failures - replace non-ASCII in script"
          git push
          echo "SUCCESS: webui.py restored with correct content"
